<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="240" height="240">

<style>
.tile{
  rx:10;
  animation:float 3s ease-in-out infinite;
}

.tile2{ fill:#eee4da; animation-delay:0s;}
.tile4{ fill:#ede0c8; animation-delay:.4s;}
.tile8{ fill:#f2b179; animation-delay:.8s;}

text{
  font-family:system-ui, Arial;
  font-weight:bold;
  fill:#776e65;
  text-anchor:middle;
  dominant-baseline:middle;
}

@keyframes float{
  0%,100%{ transform:translateY(0px);}
  50%{ transform:translateY(-6px);}
}
</style>

<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#00C6FF"/>
    <stop offset="100%" stop-color="#8E44FF"/>
  </linearGradient>
</defs>

<!-- background -->
<rect x="5" y="5" width="190" height="190" rx="30" fill="url(#bg)"/>

<!-- tiles -->
<rect class="tile tile2" x="40" y="40" width="50" height="50"/>
<text x="65" y="65" font-size="20">2</text>

<rect class="tile tile4" x="100" y="40" width="50" height="50"/>
<text x="125" y="65" font-size="20">4</text>

<rect class="tile tile8" x="70" y="100" width="60" height="60"/>
<text x="100" y="130" font-size="26" fill="#ffffff">8</text>

</svg>
