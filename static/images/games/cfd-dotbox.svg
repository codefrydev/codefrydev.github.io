<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="240" height="240">

<style>
.dot{
  fill:#ffffff;
  animation:pulse 2s infinite ease-in-out;
}

.line{
  stroke:#ffffff;
  stroke-width:4;
  stroke-linecap:round;
  stroke-dasharray:24;
  stroke-dashoffset:24;
  animation:draw 2s infinite ease-in-out;
}

@keyframes draw{
  0%{stroke-dashoffset:24;}
  50%{stroke-dashoffset:0;}
  100%{stroke-dashoffset:24;}
}

@keyframes pulse{
  0%,100%{r:4;}
  50%{r:6;}
}
</style>

<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#00C6FF"/>
    <stop offset="100%" stop-color="#8E44FF"/>
  </linearGradient>
</defs>

<!-- background -->
<rect x="5" y="5" width="150" height="150" rx="28" fill="url(#bg)"/>

<!-- grid dots -->
<circle class="dot" cx="40" cy="40" r="4"/>
<circle class="dot" cx="80" cy="40" r="4"/>
<circle class="dot" cx="120" cy="40" r="4"/>

<circle class="dot" cx="40" cy="80" r="4"/>
<circle class="dot" cx="80" cy="80" r="4"/>
<circle class="dot" cx="120" cy="80" r="4"/>

<circle class="dot" cx="40" cy="120" r="4"/>
<circle class="dot" cx="80" cy="120" r="4"/>
<circle class="dot" cx="120" cy="120" r="4"/>

<!-- animated connecting line -->
<line class="line" x1="40" y1="80" x2="80" y2="80"/>

</svg>
