<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill:#f7f7f7; stroke:#444; stroke-width:2; }
      .line { stroke:#777; stroke-width:2; stroke-linecap:round; opacity:0; animation:fade 2s ease forwards; }
      .add { stroke:#22c55e; stroke-width:3; opacity:0; animation:fade 2s ease forwards 0.6s; }
      .remove { stroke:#ef4444; stroke-width:3; opacity:0; animation:fade 2s ease forwards 0.6s; }
      .arrow { stroke:#555; stroke-width:2; fill:none; stroke-dasharray:4 3; animation:pulse 2s infinite ease-in-out; }

      @keyframes fade {
        from { opacity:0; transform:translateY(3px); }
        to { opacity:1; transform:translateY(0); }
      }

      @keyframes pulse {
        0% { stroke-opacity:0.3; }
        50% { stroke-opacity:1; }
        100% { stroke-opacity:0.3; }
      }
    </style>

    <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Left text -->
  <rect x="10" y="20" width="40" height="70" rx="6" class="box"/>
  <line x1="16" y1="35" x2="44" y2="35" class="line"/>
  <line x1="16" y1="50" x2="44" y2="50" class="line" style="animation-delay:.2s"/>
  <line x1="16" y1="65" x2="44" y2="65" class="remove"/>
  <line x1="16" y1="80" x2="40" y2="80" class="line" style="animation-delay:.4s"/>

  <!-- Right text -->
  <rect x="70" y="20" width="40" height="70" rx="6" class="box"/>
  <line x1="76" y1="35" x2="104" y2="35" class="line"/>
  <line x1="76" y1="50" x2="104" y2="50" class="line" style="animation-delay:.2s"/>
  <line x1="76" y1="65" x2="104" y2="65" class="add"/>
  <line x1="76" y1="80" x2="100" y2="80" class="line" style="animation-delay:.4s"/>

  <!-- Compare arrow -->
  <line x1="50" y1="55" x2="70" y2="55" class="arrow" marker-end="url(#arrowhead)"/>
</svg>
