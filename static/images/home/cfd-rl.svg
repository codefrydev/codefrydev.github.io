<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      .node{
        fill:#00E5FF;
      }

      .line{
        stroke:#7C3AED;
        stroke-width:3;
        opacity:0.9;
      }

      .signal{
        fill:#00FF88;
        animation:pulse 1.8s infinite;
      }

      .text{
        font-family:Arial, Helvetica, sans-serif;
        font-size:30px;
        font-weight:bold;
        fill:#FF2D95;
      }

      @keyframes pulse{
        0%{transform:scale(1)}
        50%{transform:scale(1.4)}
        100%{transform:scale(1)}
      }
    </style>
  </defs>

  <!-- connections -->
  <line x1="50" y1="60" x2="110" y2="40" class="line"/>
  <line x1="50" y1="110" x2="110" y2="110" class="line"/>
  <line x1="50" y1="160" x2="110" y2="180" class="line"/>

  <line x1="110" y1="40" x2="170" y2="70" class="line"/>
  <line x1="110" y1="110" x2="170" y2="110" class="line"/>
  <line x1="110" y1="180" x2="170" y2="150" class="line"/>

  <!-- nodes -->
  <circle cx="50" cy="60" r="9" class="node"/>
  <circle cx="50" cy="110" r="9" class="node"/>
  <circle cx="50" cy="160" r="9" class="node"/>

  <circle cx="110" cy="40" r="9" class="node"/>
  <circle cx="110" cy="110" r="9" class="node"/>
  <circle cx="110" cy="180" r="9" class="node"/>

  <circle cx="170" cy="70" r="9" class="node"/>
  <circle cx="170" cy="110" r="9" class="node"/>
  <circle cx="170" cy="150" r="9" class="node"/>

  <!-- reward signal -->
  <circle cx="170" cy="30" r="7" class="signal"/>

  <!-- RL label -->
  <text x="110" y="210" text-anchor="middle" class="text">RL</text>

</svg>