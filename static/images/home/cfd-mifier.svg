<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box { fill:#f7f7f7; stroke:#444; stroke-width:2; }
      .line { stroke:#666; stroke-width:2; stroke-linecap:round; }
      .arrow { stroke:#2563eb; stroke-width:2.5; fill:none; }
      .mini { stroke:#16a34a; stroke-width:3; stroke-linecap:round; }
    </style>

    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Original code block -->
  <rect x="10" y="20" width="40" height="70" rx="6" class="box"/>
  <line x1="16" y1="35" x2="44" y2="35" class="line"/>
  <line x1="16" y1="50" x2="44" y2="50" class="line"/>
  <line x1="16" y1="65" x2="44" y2="65" class="line"/>
  <line x1="16" y1="80" x2="44" y2="80" class="line"/>

  <!-- Arrow showing compression -->
  <line x1="50" y1="55" x2="70" y2="55" class="arrow" marker-end="url(#arrow)"/>

  <!-- Minified code block -->
  <rect x="70" y="35" width="40" height="40" rx="6" class="box"/>
  <line x1="76" y1="50" x2="104" y2="50" class="mini"/>
  <line x1="76" y1="60" x2="100" y2="60" class="mini"/>
</svg>
