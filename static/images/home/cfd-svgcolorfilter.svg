<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="scfTitle">
  <title id="scfTitle">SVG CSS Color Filter Generator</title>
  <defs>
    <linearGradient id="scfBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="scfColor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="scfGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#scfBg)"/>
  <!-- CSS code panel -->
  <rect x="56" y="72" width="400" height="368" rx="32" fill="#111827" stroke="#334155" stroke-width="4"/>
  <text x="92" y="132" font-family="JetBrains Mono, ui-monospace, monospace" font-size="28" font-weight="700" fill="#64748b">filter:</text>
  <text x="92" y="176" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" font-weight="600" fill="#38bdf8">brightness(0)</text>
  <text x="92" y="212" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" font-weight="600" fill="#c084fc">invert(42%)</text>
  <text x="92" y="248" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" font-weight="600" fill="#f472b6">hue-rotate(</text>
  <text x="92" y="284" font-family="JetBrains Mono, ui-monospace, monospace" font-size="22" font-weight="600" fill="#f472b6">  180deg);</text>
  <!-- Before: black icon -->
  <g transform="translate(300, 120)">
    <rect x="0" y="0" width="120" height="120" rx="20" fill="#0f172a" stroke="#475569" stroke-width="3"/>
    <path d="M30 88 L60 38 L90 88 Z" fill="#020617"/>
    <circle cx="60" cy="72" r="10" fill="#020617"/>
  </g>
  <!-- Arrow -->
  <path d="M330 280 L370 280 L362 268 M370 280 L362 292" fill="none" stroke="#94a3b8" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- After: colored icon -->
  <g transform="translate(300, 300)" filter="url(#scfGlow)">
    <rect x="0" y="0" width="120" height="120" rx="20" fill="#1e293b" stroke="url(#scfColor)" stroke-width="4"/>
    <path d="M30 88 L60 38 L90 88 Z" fill="url(#scfColor)"/>
    <circle cx="60" cy="72" r="10" fill="url(#scfColor)"/>
  </g>
</svg>
