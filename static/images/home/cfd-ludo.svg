<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="240" height="240">

<style>
.piece{
  animation:bounce 2.5s infinite ease-in-out;
}

.red{fill:#e74c3c; animation-delay:0s;}
.green{fill:#27ae60; animation-delay:.4s;}
.yellow{fill:#f1c40f; animation-delay:.8s;}
.blue{fill:#3498db; animation-delay:1.2s;}

@keyframes bounce{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

.grid{
  stroke:#ffffff;
  stroke-width:4;
}
</style>

<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#00C6FF"/>
    <stop offset="100%" stop-color="#8E44FF"/>
  </linearGradient>
</defs>

<!-- background -->
<rect x="5" y="5" width="190" height="190" rx="28" fill="url(#bg)"/>

<!-- board cross -->
<line class="grid" x1="100" y1="20" x2="100" y2="180"/>
<line class="grid" x1="20" y1="100" x2="180" y2="100"/>

<!-- ludo pieces -->
<circle class="piece red" cx="50" cy="50" r="14"/>
<circle class="piece green" cx="150" cy="50" r="14"/>
<circle class="piece yellow" cx="50" cy="150" r="14"/>
<circle class="piece blue" cx="150" cy="150" r="14"/>

</svg>
