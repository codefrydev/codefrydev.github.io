<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="240" height="240">

<style>
.arrow{
  animation:shoot 3s infinite ease-in-out;
}

@keyframes shoot{
  0%,100%{transform:translateX(0);}
  50%{transform:translateX(35px);}
}
</style>

<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
    <stop offset="0%" stop-color="#ff7e5f"/>
    <stop offset="100%" stop-color="#feb47b"/>
  </linearGradient>
</defs>

<!-- background -->
<rect x="10" y="10" width="200" height="200" rx="28" fill="url(#bg)"/>

<!-- target -->
<circle cx="160" cy="110" r="30" fill="#ffffff"/>
<circle cx="160" cy="110" r="22" fill="#e74c3c"/>
<circle cx="160" cy="110" r="14" fill="#ffffff"/>
<circle cx="160" cy="110" r="7" fill="#e74c3c"/>

<!-- arrow -->
<g class="arrow">
  <line x1="40" y1="110" x2="120" y2="110" stroke="#5d4037" stroke-width="4"/>
  <polygon points="120,105 135,110 120,115" fill="#5d4037"/>
  <polygon points="40,110 30,104 30,116" fill="#555"/>
</g>

</svg>
