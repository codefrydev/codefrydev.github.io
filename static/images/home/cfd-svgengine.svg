<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <rect width="512"
        height="512"
        rx="90"
        fill="#020617"/>

  <!-- Terminal -->
  <rect x="70"
        y="110"
        width="372"
        height="292"
        rx="34"
        fill="#111827"/>

  <!-- Prompt -->
  <text x="110"
        y="210"
        font-family="JetBrains Mono"
        font-size="58"
        font-weight="700"
        fill="#38bdf8">
    &gt;
  </text>

  <!-- Text -->
  <text x="160"
        y="210"
        font-family="JetBrains Mono"
        font-size="48"
        font-weight="800"
        fill="#ffffff">
    CFD
  </text>

  <text x="160"
        y="290"
        font-family="JetBrains Mono"
        font-size="48"
        font-weight="800"
        fill="#ffffff">
    SVGE
  </text>

  <!-- Cursor -->
  <rect x="338"
        y="262"
        width="18"
        height="52"
        fill="#38bdf8">
    <animate attributeName="opacity"
             values="1;0;1"
             dur="1s"
             repeatCount="indefinite"/>
  </rect>

</svg>