<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">

<defs>
<linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#52d1c6"/>
<stop offset="100%" stop-color="#3a7bd5"/>
</linearGradient>

<linearGradient id="lid" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#7c7cff"/>
<stop offset="100%" stop-color="#a78bfa"/>
</linearGradient>
</defs>

<!-- body -->
<path d="M22 25 v55 c0 7 17 12 38 12 s38-5 38-12 v-55"
fill="url(#body)"/>

<!-- rings -->
<ellipse cx="60" cy="50" rx="38" ry="12"
fill="none" stroke="white" stroke-width="3" opacity="0.35"/>

<ellipse cx="60" cy="70" rx="38" ry="12"
fill="none" stroke="white" stroke-width="3" opacity="0.25"/>

<!-- bottom -->
<ellipse cx="60" cy="80" rx="38" ry="12"
fill="#2b6cb0" opacity="0.55"/>

<!-- TOP LID (placed last so it stays above everything) -->
<ellipse cx="60" cy="25" rx="38" ry="12" fill="url(#lid)"/>

<!-- lid highlight -->
<ellipse cx="60" cy="22" rx="24" ry="6" fill="white" opacity="0.15"/>

</svg>