<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Chain Reaction Online">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12141a">
        <animate attributeName="stop-color" values="#12141a;#1a1220;#12141a" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1a1d26">
        <animate attributeName="stop-color" values="#1a1d26;#141c28;#1a1d26" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur">
        <animate attributeName="stdDeviation" values="1.2;2.4;1.2" dur="1.2s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="blur">
        <animate attributeName="stdDeviation" values="0.9;2.2;0.9" dur="2.4s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="blur">
        <animate attributeName="stdDeviation" values="0.9;2.2;0.9" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-yellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.7" result="blur">
        <animate attributeName="stdDeviation" values="0.7;1.8;0.7" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.7" result="blur">
        <animate attributeName="stdDeviation" values="0.7;1.8;0.7" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bg)">
    <animate attributeName="stroke" values="#2a2f3a;#ef476f;#26d07c;#3b9dff;#2a2f3a" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="stroke-width" values="0;0.5;0.5;0.5;0" dur="2.4s" repeatCount="indefinite"/>
  </rect>

  <g stroke="#2a2f3a" stroke-width="0.6">
    <rect x="6" y="6" width="6.5" height="6.5" rx="1.2" fill="#1c2029">
      <animate attributeName="fill" values="#1c2029;#1c2029;#1c2029;#2a2530;#1c2029" keyTimes="0;0.35;0.36;0.42;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="12.75" y="6" width="6.5" height="6.5" rx="1.2" fill="#1c2029">
      <animate attributeName="fill" values="#1c2029;#1c2029;#253028;#1c2029;#1c2029" keyTimes="0;0.35;0.42;0.48;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="19.5" y="6" width="6.5" height="6.5" rx="1.2" fill="#1c2029"/>
    <rect x="6" y="12.75" width="6.5" height="6.5" rx="1.2" fill="#1c2029">
      <animate attributeName="fill" values="#1c2029;#302028;#1c2029;#1c2029;#1c2029" keyTimes="0;0.08;0.16;0.9;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="12.75" y="12.75" width="6.5" height="6.5" rx="1.2" fill="#1c2029">
      <animate attributeName="fill" values="#1c2029;#1c2029;#203028;#1c2029;#1c2029" keyTimes="0;0.15;0.28;0.4;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="19.5" y="12.75" width="6.5" height="6.5" rx="1.2" fill="#1c2029">
      <animate attributeName="fill" values="#1c2029;#1c2029;#1c2029;#202838;#1c2029" keyTimes="0;0.28;0.29;0.38;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="6" y="19.5" width="6.5" height="6.5" rx="1.2" fill="#1c2029"/>
    <rect x="12.75" y="19.5" width="6.5" height="6.5" rx="1.2" fill="#1c2029">
      <animate attributeName="fill" values="#1c2029;#1c2029;#1c2029;#282030;#1c2029" keyTimes="0;0.42;0.43;0.52;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="19.5" y="19.5" width="6.5" height="6.5" rx="1.2" fill="#1c2029"/>
  </g>

  <!-- red orb: chain starts here -->
  <g transform="translate(9.25, 16.125)">
    <circle r="2.1" fill="#ef476f" filter="url(#glow-red)">
      <animate attributeName="r" values="2.1;2.1;3.4;2.1;2.1;2.1" keyTimes="0;0.04;0.12;0.2;0.9;1" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;1;0.85;1;1" keyTimes="0;0.04;0.12;0.2;0.9;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="0.5" fill="none" stroke="#ef476f" stroke-width="0.35" opacity="0">
      <animate attributeName="r" values="0.5;0.5;4.5;0.5;0.5" keyTimes="0;0.08;0.16;0.24;1" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.08;0.12;0.2;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- green orb: center reaction -->
  <g transform="translate(16, 16.125)">
    <circle r="2.35" fill="#26d07c" filter="url(#glow-green)">
      <animate attributeName="r" values="2.35;2.35;2.35;3.6;2.35;2.35" keyTimes="0;0.12;0.16;0.28;0.36;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="0.5" fill="none" stroke="#26d07c" stroke-width="0.4" opacity="0">
      <animate attributeName="r" values="0.5;0.5;0.5;5;0.5;0.5" keyTimes="0;0.16;0.2;0.32;0.4;1" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0;1;0;0" keyTimes="0;0.16;0.2;0.28;0.36;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- blue orb -->
  <g transform="translate(22.75, 16.125)">
    <circle r="2.1" fill="#3b9dff" filter="url(#glow-blue)">
      <animate attributeName="r" values="2.1;2.1;2.1;2.1;3.3;2.1;2.1" keyTimes="0;0.24;0.28;0.32;0.4;0.48;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="0.5" fill="none" stroke="#3b9dff" stroke-width="0.35" opacity="0">
      <animate attributeName="r" values="0.5;0.5;0.5;0.5;4.2;0.5;0.5" keyTimes="0;0.28;0.32;0.36;0.44;0.52;1" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0;0;0.85;0;0" keyTimes="0;0.28;0.32;0.36;0.4;0.48;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- yellow orb -->
  <g transform="translate(16, 9.375)">
    <circle r="1.55" fill="#ffd166" filter="url(#glow-yellow)">
      <animate attributeName="r" values="1.55;1.55;1.55;1.55;1.55;2.8;1.55;1.55" keyTimes="0;0.36;0.4;0.44;0.48;0.56;0.64;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="0.4" fill="none" stroke="#ffd166" stroke-width="0.3" opacity="0">
      <animate attributeName="r" values="0.4;0.4;0.4;0.4;0.4;3.6;0.4;0.4" keyTimes="0;0.4;0.44;0.48;0.52;0.6;0.68;1" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0;0;0;0.8;0;0" keyTimes="0;0.4;0.44;0.48;0.52;0.56;0.64;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- purple orb -->
  <g transform="translate(16, 22.875)">
    <circle r="1.55" fill="#b57bff" filter="url(#glow-purple)">
      <animate attributeName="r" values="1.55;1.55;1.55;1.55;1.55;1.55;2.8;1.55" keyTimes="0;0.48;0.52;0.56;0.6;0.64;0.72;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="0.4" fill="none" stroke="#b57bff" stroke-width="0.3" opacity="0">
      <animate attributeName="r" values="0.4;0.4;0.4;0.4;0.4;0.4;3.6;0.4" keyTimes="0;0.52;0.56;0.6;0.64;0.68;0.76;1" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0;0;0;0;0.8;0" keyTimes="0;0.52;0.56;0.6;0.64;0.68;0.72;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- travelling sparks along reaction path -->
  <circle r="0.45" fill="#ef476f" opacity="0">
    <animate attributeName="cx" values="9.25;9.25;16;16;16" keyTimes="0;0.12;0.24;0.9;1" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="16.125;16.125;16.125;16.125;16.125" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.1;0.14;0.22;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="0.45" fill="#26d07c" opacity="0">
    <animate attributeName="cx" values="16;16;22.75;22.75;22.75" keyTimes="0;0.24;0.36;0.9;1" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="16.125;16.125;16.125;16.125;16.125" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.22;0.26;0.34;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="0.4" fill="#ffd166" opacity="0">
    <animate attributeName="cx" values="16;16;16;16;16" keyTimes="0;0.36;0.48;0.9;1" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="16.125;16.125;9.375;9.375;9.375" keyTimes="0;0.36;0.48;0.9;1" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.34;0.38;0.46;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle r="0.4" fill="#b57bff" opacity="0">
    <animate attributeName="cx" values="16;16;16;16;16" keyTimes="0;0.48;0.6;0.9;1" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="16.125;16.125;22.875;22.875;22.875" keyTimes="0;0.48;0.6;0.9;1" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.46;0.5;0.58;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
