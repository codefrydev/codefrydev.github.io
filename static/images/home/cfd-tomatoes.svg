<svg width="170" height="170" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

<defs>

<radialGradient id="tomatoGrad" cx="35%" cy="30%">
<stop offset="0%" stop-color="#ff9a8f"/>
<stop offset="60%" stop-color="#ff3b2f"/>
<stop offset="100%" stop-color="#8f1515"/>
</radialGradient>

<linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#4caf50"/>
<stop offset="100%" stop-color="#1b5e20"/>
</linearGradient>

<linearGradient id="liquidGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#ff6b63"/>
<stop offset="60%" stop-color="#e03b2f"/>
<stop offset="100%" stop-color="#b11b1b"/>
</linearGradient>

<clipPath id="clipTomato">
<circle cx="100" cy="115" r="60"/>
</clipPath>

</defs>

<!-- tomato -->
<circle cx="100" cy="115" r="60" fill="url(#tomatoGrad)"/>

<!-- liquid -->
<g clip-path="url(#clipTomato)">

<g>

<!-- rising animation -->
<animateTransform
attributeName="transform"
type="translate"
values="0 95;0 -55"
dur="12s"
repeatCount="indefinite"
/>

<!-- fade near top -->
<animate
attributeName="opacity"
values="1;1;0"
keyTimes="0;0.85;1"
dur="12s"
repeatCount="indefinite"
/>

<!-- wave layer -->
<g>

<animateTransform
attributeName="transform"
type="translate"
values="0 0;-300 0"
dur="7s"
repeatCount="indefinite"
/>

<path
fill="url(#liquidGrad)"
opacity="0.85"
d="
M -800 120
Q -760 105 -720 120
T -640 120
T -560 120
T -480 120
T -400 120
T -320 120
T -240 120
T -160 120
T -80 120
T 0 120
T 80 120
T 160 120
T 240 120
T 320 120
T 400 120
T 480 120
T 560 120
T 640 120
T 720 120
T 800 120
V300 H-800 Z
"/>

</g>

<!-- second wave -->
<g opacity="0.45">

<animateTransform
attributeName="transform"
type="translate"
values="0 6;-300 6"
dur="10s"
repeatCount="indefinite"
/>

<path
fill="url(#liquidGrad)"
d="
M -800 120
Q -780 118 -740 122
T -660 120
T -580 118
T -500 122
T -420 120
T -340 118
T -260 122
T -180 120
T -100 118
T -20 122
T 60 120
T 140 118
T 220 122
T 300 120
T 380 118
T 460 122
T 540 120
T 620 118
T 700 122
T 780 120
V300 H-800 Z
"/>

</g>

</g>

</g>

<!-- stem -->
<rect x="96" y="45" width="8" height="14" rx="3" fill="#2e7d32"/>

<!-- leaves -->
<g fill="url(#leafGrad)">
<path d="
M100 55
C120 40 145 55 125 75
C112 67 105 65 100 67
C95 65 88 67 75 75
C55 55 80 40 100 55
Z"/>
<path d="M82 60 C65 60 65 78 82 72 C90 70 95 66 98 64Z"/>
<path d="M118 60 C135 60 135 78 118 72 C110 70 105 66 102 64Z"/>
</g>

<!-- highlight -->
<ellipse cx="78" cy="95" rx="16" ry="28" fill="white" opacity="0.16"/>

</svg>