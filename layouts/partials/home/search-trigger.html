{{- $placeholder := .placeholder | default "Search tools, games, AI apps…" -}}
{{- $class := .class | default "" -}}
{{- $size := .size | default "md" -}}
{{- $category := .category | default "" -}}
{{- $categorySlug := .categorySlug | default "" -}}
<button
  type="button"
  class="search-trigger search-trigger--{{ $size }} {{ $class }}"
  data-search-open
  {{- with $category }} data-search-category="{{ . }}"{{ end }}
  {{- with $categorySlug }} data-search-category-slug="{{ . }}"{{ end }}
  aria-label="Open search"
  aria-keyshortcuts="Control+K Meta+K"
>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" class="search-trigger__icon shrink-0" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <span class="search-trigger__label">{{ $placeholder }}</span>
  <kbd class="search-trigger__kbd" aria-hidden="true"><span data-search-kbd-mod>⌘</span>K</kbd>
</button>
