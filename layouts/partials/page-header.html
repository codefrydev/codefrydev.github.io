{{- /* Single header partial: exact homepage design on every page. Pass page context (.) only. */ -}}
<header class="page-header" role="banner">
  <a href="/" id="ladybug-logo-anchor" class="page-header-logo-link" aria-label="CodeFryDev Homepage">
    <img fetchpriority="high" src="/images/IconCodefrydev.svg" srcset="/images/IconCodefrydev.svg" alt="CodeFryDev logo - Tools, Games, Art, Animation" width="96" height="96">
  </a>
  <h1 id="ladybug-h1-bite-target">CodeFryDev<sup style="font-size: small; font-weight: bold;"> Alpha</sup></h1>
  <p class="tagline">Tools, Games, Art, Animation</p>
  <p class="home-cta-hero">
    <a href="/Updates/" class="home-cta-secondary">.NET</a>
    <a href="/designlab" class="home-cta-secondary">Design lab</a>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch theme" title="Switch theme">
      <span class="theme-icon" aria-hidden="true">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </span>
    </button>
  </p>
  {{ partial "navigation.html" . }}
</header>
