testimonials:
- quote: JSONフォーマッターやJSONプレイグラウンドが必要なとき、CodeFryDevが定番です。
  author: Shubham P
  handle: "@shubham.p"
- quote: Chain Reactionのために来ました — 広告も余計なものもありません。
  author: Umang Kumar
  handle: "@umangKum"
- quote: OCRツールを探して来ました。このサイトが大好きです — 本当にありがとう。
  author: Avinash Kumar
  handle: "@Avibaoss"
  avatar: https://i.pravatar.cc/150?img=33
- quote: チームはSEOとmeta tagツールを毎週使用。シンプルUI、散らかりなし — サブスクなし、広告なし、すべて無料、ローカル実行。多くの開発者の助けに。
  author: Fredrick
  handle: "@sriLankanFredrick"
- quote: どのツールから選べばいいかわかりません — ここのツールはすべて素晴らしい。無料のままでお願いします。
  author: Vivek Bhuj
  handle: "@bhujOnly"
- quote: WordleとSnakeは5分休憩に最適。インストール不要、アカウント不要 — 開いてプレイ。
  author: Sam D.
  handle: "@dawsontechtips"
- quote: AIツールは増え続けています — 別のSaaSに登録せずに要約とジェネレーター。
  author: Riley K.
  handle: "@rileysmith1"
- quote: DSAアニメーションとパズルのために学生をここに送ります。クリーンで高速、いつでも利用可能。
  author: Dr. Anika R.
  handle: "@anika_teaches"
