why:
  title: なぜCodeFryDevを選ぶのか？
  intro: 学び、実験プロジェクト、ゲーム、アイデア創出などを行うプラットフォーム…
  bullets:
  - 100%無料——ほとんどのツールは登録不要
  - ブラウザで動作——インストール不要
  - 新しいツールとゲームを定期的に追加
  - プライバシー重視——作業はデバイス上に留まります
  highlights:
  - title: クリエイティブ & アセット
    icon: "\U0001F3A8"
    text: デザイナーと開発者向けデジタルアートツール、壁紙、3Dモデル、DSA学習リソースなど。
  - title: ツール & ユーティリティ
    icon: "\U0001F6E0️"
    text: JSONフォーマッター、SEOツール、meta tagジェネレーター、テキストエディター、日常の生産性ユーティリティ。
  - title: ゲーム & ファン
    icon: "\U0001F3AE"
    text: Wordle、Snake、Chain Reaction、アーケードクラシック — ブラウザですぐプレイ。
  - title: AI & デザインラボ
    icon: "\U0001F916"
    text: AIアプリに加え、デザインユーティリティ、ビジュアライザー、クリエイティブワークフローを一箇所に。
