why:
  title: "Why Choose CodeFryDev?"
  intro: "This is a platform where we learn, work on experimental projects, play games, come up with innovative ideas, and build many more..."
  bullets:
    - "100% free — most tools need no signup"
    - "Runs in your browser — no install required"
    - "Regular updates with new tools and games"
    - "Privacy-focused — your work stays on your device"
  highlights:
    - title: "Creative & Assets"
      icon: "🎨"
      text: "Digital art tools, wallpapers, 3D models, DSA learning resources, and more for designers and developers."
    - title: "Tools & Utilities"
      icon: "🛠️"
      text: "JSON formatters, SEO tools, meta tag generators, text editors, and everyday productivity utilities."
    - title: "Games & Fun"
      icon: "🎮"
      text: "Wordle, Snake, Chain Reaction, and arcade classics—play instantly in your browser."
    - title: "AI & Design Lab"
      icon: "🤖"
      text: "AI-powered apps plus design utilities, visualizers, and creative workflows in one place."

