testimonials:
- quote: CodeFryDev est mon réflexe quand j'ai besoin d'un formateur JSON rapide ou d'un bac à sable JSON.
  author: Shubham P
  handle: "@shubham.p"
- quote: Je suis venu uniquement pour Chain Reaction — pas de pub ni d'extras agaçants.
  author: Umang Kumar
  handle: "@umangKum"
- quote: Je suis venu chercher des outils OCR. J'adore ce site — merci beaucoup les gars.
  author: Avinash Kumar
  handle: "@Avibaoss"
  avatar: https://i.pravatar.cc/150?img=33
- quote: >-
    Notre équipe utilise les outils SEO et meta tags chaque semaine. Interface simple, sans encombrement — pas d'abonnement,
    pas de pub, tout gratuit, et ça tourne localement. Ça aide beaucoup de développeurs.
  author: Fredrick
  handle: "@sriLankanFredrick"
- quote: Je ne sais pas quel outil choisir en premier — chaque outil ici est génial. Merci de le garder gratuit.
  author: Vivek Bhuj
  handle: "@bhujOnly"
- quote: Wordle et Snake sont parfaits pour une pause de cinq minutes. Pas d'installation, pas de compte — ouvrez et jouez.
  author: Sam D.
  handle: "@dawsontechtips"
- quote: Les outils IA ne cessent de croître — résumés et générateurs sans s'inscrire à un autre SaaS.
  author: Riley K.
  handle: "@rileysmith1"
- quote: J'envoie mes étudiants ici pour les animations DSA et les puzzles. Propre, rapide et toujours disponible.
  author: Dr. Anika R.
  handle: "@anika_teaches"
