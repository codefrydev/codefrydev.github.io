why:
  title: Pourquoi choisir CodeFryDev ?
  intro: Une plateforme où nous apprenons, expérimentons, jouons, inventons des idées innovantes et bien plus encore…
  bullets:
  - 100 % gratuit — la plupart des outils sans inscription
  - Fonctionne dans votre navigateur — aucune installation
  - Mises à jour régulières avec de nouveaux outils et jeux
  - Respect de la vie privée — votre travail reste sur votre appareil
  highlights:
  - title: Créatif & Assets
    icon: "\U0001F3A8"
    text: Outils d'art numérique, fonds d'écran, modèles 3D, ressources DSA et plus pour designers et développeurs.
  - title: Outils & Utilitaires
    icon: "\U0001F6E0️"
    text: Formateurs JSON, outils SEO, générateurs de meta tags, éditeurs de texte et utilitaires de productivité quotidiens.
  - title: Jeux & Fun
    icon: "\U0001F3AE"
    text: Wordle, Snake, Chain Reaction et classiques d'arcade — jouez instantanément dans votre navigateur.
  - title: IA & Design Lab
    icon: "\U0001F916"
    text: Applications IA, utilitaires de design, visualiseurs et workflows créatifs en un seul endroit.
