why:
  title: CodeFryDev क्यों चुनें?
  intro: यह एक मंच है जहाँ हम सीखते, प्रयोग करते, गेम खेलते, नए विचार बनाते और बहुत कुछ…
  bullets:
  - 100% मुफ़्त — ज़्यादातर टूल में साइनअप नहीं
  - आपके ब्राउज़र में चलता है — इंस्टॉल की ज़रूरत नहीं
  - नए टूल और गेम के साथ नियमित अपडेट
  - गोपनीयता-केंद्रित — आपका काम आपके डिवाइस पर रहता है
  highlights:
  - title: क्रिएटिव & एसेट
    icon: "\U0001F3A8"
    text: डिज़ाइनर और डेवलपर के लिए डिजिटल आर्ट टूल, वॉलपेपर, 3D मॉडल, DSA सीखने के संसाधन और अधिक।
  - title: टूल & यूटिलिटी
    icon: "\U0001F6E0️"
    text: JSON फ़ॉर्मेटर, SEO टूल, meta tag जनरेटर, टेक्स्ट एडिटर और रोज़मर्रा की उत्पादकता यूटिलिटी।
  - title: गेम & फ़न
    icon: "\U0001F3AE"
    text: Wordle, Snake, Chain Reaction और आर्केड क्लासिक — ब्राउज़र में तुरंत खेलें।
  - title: AI & डिज़ाइन लैब
    icon: "\U0001F916"
    text: AI ऐप्स के साथ डिज़ाइन यूटिलिटी, विज़ुअलाइज़र और क्रिएटिव वर्कफ़्लो एक जगह।
