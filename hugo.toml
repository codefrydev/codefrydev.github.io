baseURL = 'https://codefrydev.in/'
locale = 'en-US'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false
title = 'CodeFryDev'
enableMissingTranslationPlaceholders = false

# No tagged content; skip /tags/ and /categories/ list pages
disableKinds = ["taxonomy", "term"]

[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["txt"]

[outputFormats]
  [outputFormats.LLMS]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true
  [outputFormats.LLMSFULL]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "ROBOTS", "LLMS", "LLMSFULL"]

[Author]
  name = "CodeFryDev"

[params]
  description = "This is a platform where we learn, work on experimental projects, play games, come up with innovative ideas, and build many more..."
  footer_tagline = "This is a platform where we learn, work on experimental projects, play games, come up with innovative ideas, and build many more..."
  logo = "favicon-32x32.png"
  copyright = "codefrydev.in"
  paginate = 10
  env = "production"
  google_analytics_id = "G-VM01Q3R43D"
  microsoft_clarity_id = "mxr4hxioh4"
  tawk_property_id = "65e349c48d261e1b5f67a15f"
  tawk_widget_id = "1hnvtgaht"
  # Add static/images/og-default.png (1200×630) for better social sharing; omit or leave empty to use logo
  default_og_image = "images/og-default.jpg"
  
  [params.social]
    twitter = "codefrydev"
  
  [assets]
    favicon = "favicon.ico"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"
    apple_touch_icon = "apple-touch-icon.png"
    safari_pinned_tab = "safari-pinned-tab.svg"
  
  [label]
    text = "CodeFryDev"
    icon = "favicon.ico"
    iconHeight = 35

  [sitemap]
    changefreq = "monthly"
    priority = 0.5
    filename = "sitemap.xml"

[languages]
  [languages.en]
    locale = "en-US"
    label = "English"
    weight = 1
    contentDir = "content"
    [languages.en.params]
      description = "This is a platform where we learn, work on experimental projects, play games, come up with innovative ideas, and build many more..."
      footer_tagline = "This is a platform where we learn, work on experimental projects, play games, come up with innovative ideas, and build many more..."

  [languages.ja]
    locale = "ja-JP"
    label = "日本語"
    weight = 2
    contentDir = "content-ja"
    [languages.ja.params]
      description = "学び、実験プロジェクト、ゲーム、アイデア創出などを行うプラットフォーム…"
      footer_tagline = "学び、実験プロジェクト、ゲーム、アイデア創出などを行うプラットフォーム…"

  [languages.fr]
    locale = "fr-FR"
    label = "Français"
    weight = 3
    contentDir = "content-fr"
    [languages.fr.params]
      description = "Une plateforme où nous apprenons, expérimentons, jouons, inventons des idées innovantes et bien plus encore…"
      footer_tagline = "Une plateforme où nous apprenons, expérimentons, jouons, inventons des idées innovantes et bien plus encore…"

  [languages.hi]
    locale = "hi-IN"
    label = "हिन्दी"
    weight = 4
    contentDir = "content-hi"
    [languages.hi.params]
      description = "यह एक मंच है जहाँ हम सीखते, प्रयोग करते, गेम खेलते, नए विचार बनाते और बहुत कुछ…"
      footer_tagline = "यह एक मंच है जहाँ हम सीखते, प्रयोग करते, गेम खेलते, नए विचार बनाते और बहुत कुछ…"

[module]
  [[module.mounts]]
    source = "content"
    target = "content"
    [module.mounts.sites.matrix]
      languages = ["en"]
  [[module.mounts]]
    source = "content-ja"
    target = "content"
    [module.mounts.sites.matrix]
      languages = ["ja"]
  [[module.mounts]]
    source = "content-fr"
    target = "content"
    [module.mounts.sites.matrix]
      languages = ["fr"]
  [[module.mounts]]
    source = "content-hi"
    target = "content"
    [module.mounts.sites.matrix]
      languages = ["hi"]
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "static"
    target = "assets"
