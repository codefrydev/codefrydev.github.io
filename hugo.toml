baseURL = 'https://codefrydev.in/'
languageCode = 'en-US'
defaultContentLanguage = 'en'
title = 'CodeFryDev'

# No tagged content; skip /tags/ and /categories/ list pages
disableKinds = ["taxonomy", "term"]

[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["txt"]

[outputFormats]
  [outputFormats.LLMS]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true
  [outputFormats.LLMSFULL]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "ROBOTS", "LLMS", "LLMSFULL"]

[Author]
  name = "CodeFryDev"

[params]
  description = "This is a platform where we learn, work on experimental projects, play games, come up with innovative ideas, and build many more..."
  footer_tagline = "This is a platform where we learn, work on experimental projects, play games, come up with innovative ideas, and build many more..."
  logo = "favicon-32x32.png"
  copyright = "codefrydev.in"
  paginate = 10
  env = "production"
  google_analytics_id = "G-VM01Q3R43D"
  microsoft_clarity_id = "mxr4hxioh4"
  # Add static/images/og-default.png (1200×630) for better social sharing; omit or leave empty to use logo
  default_og_image = "images/og-default.jpg"
  
  [params.social]
    twitter = "codefrydev"
  
  [assets]
    favicon = "favicon.ico"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"
    apple_touch_icon = "apple-touch-icon.png"
    safari_pinned_tab = "safari-pinned-tab.svg"
  
  [label]
    text = "CodeFryDev"
    icon = "favicon.ico"
    iconHeight = 35

  [sitemap]
    changefreq = "monthly"
    priority = 0.5
    filename = "sitemap.xml"

[languages]
  [languages.en]
    languageCode = "en-US"
    languageName = "English"
    weight = 1
    contentDir = "content"


[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "static"
    target = "assets"
